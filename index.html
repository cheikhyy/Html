<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cours HTML — GoMyCode Dakar</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0f13; --bg2:#16161e; --bg3:#1e1e2a; --bg4:#252535;
  --border:#2a2a3a; --or:#ff6b35; --og:rgba(255,107,53,.12);
  --gr:#2ecc71; --gb:rgba(46,204,113,.1);
  --rd:#e74c3c; --rb:rgba(231,76,60,.1);
  --bl:#3b82f6; --bb:rgba(59,130,246,.1);
  --yl:#f59e0b;
  --tx:#e8e8f0; --tx2:#9090a8; --tx3:#5a5a72;
  --kw:#ff79c6; --tg:#8be9fd; --at:#50fa7b; --vl:#f1fa8c; --cm:#6272a4; --ct:#f8f8f2;
  --fn:'Space Grotesk',sans-serif; --mo:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fn);background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}

/* SIDEBAR */
.sb{position:fixed;top:0;left:0;width:255px;height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100}
.sb-hd{padding:1.2rem 1.2rem .9rem;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:.9rem}
.logo-ic{width:36px;height:36px;border-radius:8px;background:var(--or);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.logo-tx{font-size:13px;font-weight:700;line-height:1.3}
.logo-sub{font-size:11px;color:var(--tx2);font-weight:400}
.gp-row{display:flex;justify-content:space-between;font-size:11px;color:var(--tx2);margin-bottom:4px}
.gp-bar{background:var(--bg4);border-radius:4px;height:5px;overflow:hidden}
.gp-fill{height:100%;background:var(--or);border-radius:4px;transition:width .5s}
.nav{flex:1;overflow-y:auto;padding:.5rem 0}
.ni{display:flex;align-items:center;gap:10px;padding:.6rem 1.2rem;cursor:pointer;font-size:13px;color:var(--tx2);border:none;background:none;width:100%;font-family:var(--fn);position:relative;transition:all .2s}
.ni:hover{color:var(--tx);background:var(--bg3)}
.ni.act{color:var(--or);background:var(--og)}
.ni.act::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--or);border-radius:0 2px 2px 0}
.ni-ic{width:26px;height:26px;border-radius:7px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ni.act .ni-ic{background:var(--og)}
.ni.done .ni-ic{background:var(--gb)}
.ni-tx{flex:1;font-weight:500;text-align:left}
.ni-ck{font-size:12px;color:var(--gr);opacity:0;transition:opacity .3s}
.ni.done .ni-ck{opacity:1}
.sb-ft{padding:.75rem 1.2rem;border-top:1px solid var(--border);font-size:11px;color:var(--tx3)}

/* MAIN */
.main{margin-left:255px}
.mod{display:none}
.mod.act{display:block}

/* HERO */
.hero{background:var(--bg2);border-bottom:1px solid var(--border);padding:1.5rem 2.25rem 0;position:sticky;top:0;z-index:50}
.hero-top{display:flex;align-items:center;gap:10px;margin-bottom:.3rem}
.m-badge{background:var(--og);color:var(--or);font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;border:1px solid rgba(255,107,53,.2);letter-spacing:.5px;text-transform:uppercase}
.m-dur{font-size:12px;color:var(--tx3)}
.m-ttl{font-size:21px;font-weight:700;margin-bottom:1.2rem}
.tabs{display:flex;border-bottom:1px solid var(--border)}
.tb{padding:.6rem 1rem;font-size:13px;font-family:var(--fn);color:var(--tx2);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-weight:500;transition:all .2s;white-space:nowrap}
.tb:hover{color:var(--tx)}
.tb.act{color:var(--or);border-bottom-color:var(--or)}

/* TABS */
.tc{display:none}
.tc.act{display:block}

/* LESSON */
.lesson{padding:1.75rem 2.25rem;max-width:880px}
.anl{background:linear-gradient(135deg,rgba(255,107,53,.07),rgba(255,107,53,.02));border:1px solid rgba(255,107,53,.2);border-radius:14px;padding:1.2rem 1.4rem;margin:1.4rem 0}
.anl-lbl{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--or);text-transform:uppercase;margin-bottom:.4rem}
.anl p{font-size:14px;color:var(--tx2);line-height:1.8}
.anl strong{color:var(--tx)}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:9px;margin:1.3rem 0}
.cc{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:.9rem;transition:all .2s}
.cc:hover{border-color:var(--or);transform:translateY(-2px)}
.cc-ic{font-size:20px;margin-bottom:.35rem}
.cc-tg{font-family:var(--mo);font-size:11px;color:var(--tg);margin-bottom:3px}
.cc-ds{font-size:11px;color:var(--tx2);line-height:1.5}
h2.st{font-size:17px;font-weight:700;margin:1.75rem 0 .6rem;padding-top:1.4rem;border-top:1px solid var(--border)}
h2.st:first-child{border-top:none;padding-top:0;margin-top:0}
p.lt{font-size:14px;color:var(--tx2);line-height:1.8;margin-bottom:.6rem}
.tip{background:var(--bb);border:1px solid rgba(59,130,246,.2);border-radius:9px;padding:.9rem 1.2rem;margin:.9rem 0;font-size:13px;color:var(--tx2);line-height:1.7}
.tip strong{color:var(--bl)}
.wrn{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);border-radius:9px;padding:.9rem 1.2rem;margin:.9rem 0;font-size:13px;color:var(--tx2);line-height:1.7}
.wrn strong{color:var(--yl)}

/* CODE BLOCK */
.cw{position:relative;margin:1.1rem 0}
.cfl{background:var(--bg4);border:1px solid var(--border);border-bottom:none;border-radius:9px 9px 0 0;padding:.4rem .9rem;font-family:var(--mo);font-size:11px;color:var(--tx3);display:flex;align-items:center;gap:5px}
.cfl span{color:#ff8c5a}
.cb{background:#0d1117;border:1px solid var(--border);border-radius:0 0 9px 9px;padding:1.1rem;overflow-x:auto;font-family:var(--mo);font-size:12.5px;line-height:1.8}
.ln-row{display:flex}
.ln{color:#3d4054;min-width:26px;user-select:none;margin-right:14px;text-align:right;font-size:11px;padding-top:1px}
.lc{flex:1}
.kw{color:var(--kw)}.tg{color:var(--tg)}.at{color:var(--at)}.vl{color:var(--vl)}.cm{color:var(--cm);font-style:italic}.ct{color:var(--ct)}
.cp{position:absolute;top:36px;right:10px;background:var(--bg4);border:1px solid var(--border);color:var(--tx2);font-size:11px;font-family:var(--mo);padding:3px 9px;border-radius:5px;cursor:pointer;transition:all .2s}
.cp:hover{background:var(--or);color:#fff;border-color:var(--or)}
code{font-family:var(--mo);font-size:12px;background:var(--bg4);color:var(--tg);padding:2px 5px;border-radius:4px}

/* ATELIER */
.atl{display:grid;grid-template-columns:1fr 1fr;height:calc(100vh - 142px)}
.ed-s{border-right:1px solid var(--border);display:flex;flex-direction:column}
.ed-tb{background:var(--bg3);border-bottom:1px solid var(--border);padding:.5rem 1rem;display:flex;align-items:center;gap:8px}
.ed-tb span{font-size:12px;color:var(--tx2);font-family:var(--mo)}
.run-b{background:var(--or);color:#fff;border:none;border-radius:6px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;margin-left:auto;font-family:var(--fn);transition:opacity .2s}
.run-b:hover{opacity:.85}
.rst-b{background:var(--bg4);color:var(--tx2);border:1px solid var(--border);border-radius:6px;padding:5px 11px;font-size:12px;cursor:pointer;font-family:var(--fn);transition:all .2s}
.rst-b:hover{border-color:var(--or);color:var(--or)}
.ced{flex:1;background:#0d1117;color:var(--at);font-family:var(--mo);font-size:13px;line-height:1.8;border:none;outline:none;resize:none;padding:1.1rem;tab-size:2}
.pv-s{display:flex;flex-direction:column}
.pv-tb{background:var(--bg3);border-bottom:1px solid var(--border);padding:.5rem 1rem;display:flex;align-items:center;gap:8px}
.pv-tb span{font-size:12px;color:var(--tx2)}
.dots{display:flex;gap:5px}
.dot{width:10px;height:10px;border-radius:50%}
.dr{background:#ff5f57}.dy{background:#febc2e}.dg{background:#28c840}
.pvf{flex:1;border:none;background:#fff}

/* EXERCICES */
.exp{padding:1.75rem 2.25rem}
.exb{background:var(--bg3);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:1.4rem}
.exh{background:var(--bg4);padding:.9rem 1.4rem;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.ex-n{width:28px;height:28px;border-radius:50%;background:var(--or);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ex-t{font-size:15px;font-weight:600}
.ex-d{margin-left:auto;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700}
.easy{background:rgba(46,204,113,.15);color:var(--gr)}
.med{background:rgba(245,158,11,.15);color:var(--yl)}
.hard{background:rgba(231,76,60,.15);color:var(--rd)}
.exbd{padding:1.2rem 1.4rem}
.exbd p{font-size:14px;color:var(--tx2);margin-bottom:.7rem;line-height:1.7}
.exbd ul{padding-left:1.4rem}
.exbd li{font-size:14px;color:var(--tx2);line-height:2.1}
.exbd li strong{color:#ff8c5a}
.lex{display:inline-flex;align-items:center;gap:8px;background:var(--or);color:#fff;border:none;border-radius:8px;padding:.55rem 1.2rem;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--fn);margin-top:.7rem;transition:opacity .2s}
.lex:hover{opacity:.85}

/* QUIZ */
.qp{padding:1.75rem 2.25rem;max-width:700px}
.qhd{margin-bottom:1.75rem}
.qhd h2{font-size:19px;font-weight:700;margin-bottom:.35rem}
.qhd p{font-size:14px;color:var(--tx2)}
.qprev{display:flex;align-items:center;gap:14px;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:.8rem 1.2rem;margin-bottom:1.75rem}
.qprev-ic{font-size:22px}
.qprev-inf{font-size:13px;color:var(--tx2)}
.qprev-inf strong{color:var(--tx);display:block;font-size:15px;font-weight:700}
.qq{margin-bottom:2.25rem;padding-bottom:2.25rem;border-bottom:1px solid var(--border)}
.qq:last-of-type{border-bottom:none}
.q-n{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--or);text-transform:uppercase;margin-bottom:.5rem}
.q-t{font-size:15px;font-weight:600;margin-bottom:1.1rem;line-height:1.5}
.q-code{background:#0d1117;border:1px solid var(--border);border-radius:9px;padding:.9rem;font-family:var(--mo);font-size:12.5px;color:var(--ct);margin-bottom:1.1rem;line-height:1.7}
.opts{display:flex;flex-direction:column;gap:7px}
.opt{display:flex;align-items:flex-start;gap:11px;padding:.8rem 1.1rem;border:1px solid var(--border);border-radius:9px;cursor:pointer;transition:all .2s;background:var(--bg3);font-size:14px;color:var(--tx2);line-height:1.5}
.opt:hover:not(.lck){border-color:var(--or);color:var(--tx);background:var(--og)}
.opt-l{width:23px;height:23px;border-radius:6px;background:var(--bg4);color:var(--tx2);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.opt.ok{border-color:var(--gr);background:var(--gb);color:var(--tx)}
.opt.ok .opt-l{background:var(--gr);color:#fff}
.opt.ko{border-color:var(--rd);background:var(--rb);color:var(--tx)}
.opt.ko .opt-l{background:var(--rd);color:#fff}
.opt.lck{cursor:default}
.opt.rev{border-color:var(--gr);background:var(--gb);opacity:.6}
.opt.rev .opt-l{background:var(--gr);color:#fff}
.q-exp{background:var(--bg4);border:1px solid var(--border);border-radius:9px;padding:.9rem 1.1rem;margin-top:.6rem;font-size:13px;color:var(--tx2);line-height:1.7;display:none}
.q-exp.sh{display:block}
.q-exp strong{color:var(--tx)}
.qres{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:1.75rem;text-align:center;margin-top:1.75rem;display:none}
.qres.sh{display:block}
.re-em{font-size:44px;margin-bottom:.75rem}
.re-st{font-size:26px;margin-bottom:.75rem}
.re-ttl{font-size:20px;font-weight:700;margin-bottom:.4rem}
.re-sc{font-size:38px;font-weight:700;color:var(--or);margin:.75rem 0}
.re-msg{font-size:14px;color:var(--tx2);margin-bottom:1.25rem;line-height:1.7}
.vbtn{display:block;width:100%;padding:.8rem;background:var(--or);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--fn);margin-top:1.75rem;transition:opacity .2s}
.vbtn:hover{opacity:.85}
.rbtn{background:var(--bg4);color:var(--tx);border:1px solid var(--border);border-radius:9px;padding:.55rem 1.4rem;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--fn);transition:all .2s;margin-top:.6rem}
.rbtn:hover{border-color:var(--or);color:var(--or)}
.done-bn{margin:1.75rem 2.25rem;background:linear-gradient(135deg,rgba(46,204,113,.1),rgba(46,204,113,.03));border:1px solid rgba(46,204,113,.3);border-radius:14px;padding:1.6rem;text-align:center;display:none}
.done-bn.sh{display:block}
.done-bn h3{font-size:19px;font-weight:700;color:var(--gr);margin-bottom:.4rem}
.done-bn p{font-size:14px;color:var(--tx2);margin-bottom:1rem}
.nbtn{background:var(--gr);color:#fff;border:none;border-radius:8px;padding:.65rem 1.75rem;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--fn);transition:opacity .2s}
.nbtn:hover{opacity:.85}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}

@media(max-width:860px){
  .sb{width:56px}
  .logo-tx,.sb-ft,.gp-row,.gp-bar,.ni-tx,.ni-ck{display:none}
  .logo{justify-content:center}
  .ni{justify-content:center;padding:.7rem}
  .main{margin-left:56px}
  .atl{grid-template-columns:1fr;height:auto}
  .ed-s{height:50vh}
  .pv-s{height:45vh}
  .lesson,.exp,.qp{padding:1.2rem}
  .hero{padding:1.2rem 1.2rem 0}
}
</style>
</head>
<body>

<aside class="sb">
  <div class="sb-hd">
    <div class="logo">
      <div class="logo-ic">🌐</div>
      <div class="logo-tx">Cours HTML<div class="logo-sub">GoMyCode Dakar</div></div>
    </div>
    <div class="gp-row"><span>Progression</span><span id="gpt">0/6</span></div>
    <div class="gp-bar"><div class="gp-fill" id="gpf" style="width:0%"></div></div>
  </div>
  <nav class="nav" id="nav"></nav>
  <div class="sb-ft">Coach Mbengue · 2025</div>
</aside>

<!-- MAIN -->
<main class="main" id="main"></main>

<script>

var DEFAULTS = [
  // Module 0
  "<!DOCTYPE html>\n<html lang=\"fr\">\n<head>\n  <meta charset=\"UTF-8\">\n  <title>Ma première page</title>\n</head>\n<body>\n  <h1>Bonjour Dakar ! 🌍</h1>\n  <p>Ma toute première page HTML.</p>\n</body>\n</html>",
  // Module 1
  "<h1>Bienvenue chez Innovatech 🚀</h1>\n<h2>Nos services</h2>\n<p>Nous créons des sites web <strong>professionnels</strong> pour les commerces de <em>Dakar</em>.</p>\n\n<h3>Ce qu'on fait</h3>\n<ul>\n  <li>Sites vitrines</li>\n  <li>E-commerce Wave & Orange Money</li>\n  <li>Réseaux sociaux</li>\n</ul>\n\n<h3>Notre process</h3>\n<ol>\n  <li>Discussion client</li>\n  <li>Maquette</li>\n  <li>Développement</li>\n  <li>Mise en ligne</li>\n</ol>",

  // Module 3
  "<h2>Commande Wave 💳</h2>\n\n<form action=\"#\" method=\"post\">\n\n  <label for=\"nom\">Votre nom :</label><br>\n  <input type=\"text\" id=\"nom\" name=\"nom\"\n    placeholder=\"Ex: Amadou Diallo\" required>\n  <br><br>\n\n  <label for=\"tel\">Numéro Wave :</label><br>\n  <input type=\"tel\" id=\"tel\" name=\"tel\"\n    placeholder=\"77 000 00 00\">\n  <br><br>\n\n  <label for=\"produit\">Produit :</label><br>\n  <select id=\"produit\" name=\"produit\">\n    <option value=\"\">-- Choisir --</option>\n    <option value=\"boubou\">Boubou brodé - 25 000 F</option>\n    <option value=\"robe\">Robe wax - 15 000 F</option>\n    <option value=\"kaftan\">Kaftan homme - 18 000 F</option>\n  </select>\n  <br><br>\n\n  <label for=\"note\">Note de livraison :</label><br>\n  <textarea id=\"note\" name=\"note\"\n    rows=\"3\" placeholder=\"Quartier, adresse...\"></textarea>\n  <br><br>\n\n  <input type=\"checkbox\" id=\"accept\">\n  <label for=\"accept\">J'accepte les conditions</label>\n  <br><br>\n\n  <button type=\"submit\">✅ Confirmer</button>\n  <button type=\"reset\">🔄 Effacer</button>\n\n</form>",
  // Module 4

  '    <span class="tg">&lt;tr&gt;</span>',
  '      <span class="tg">&lt;td</span> <span class="at">colspan</span>=<span class="vl">"3"</span><span class="tg">&gt;</span><span class="ct">✅ Wave & Orange Money</span><span class="tg">&lt;/td&gt;</span>  <span class="cm">&lt;!-- fusionne 3 col --&gt;</span>',
  '    <span class="tg">&lt;/tr&gt;</span>',
  '  <span class="tg">&lt;/tfoot&gt;</span>',
  '',
  '<span class="tg">&lt;/table&gt;</span>'
]) +
'<div class="tip"><strong>💡 colspan vs rowspan :</strong> <code>colspan="3"</code> = fusion horizontale. <code>rowspan="2"</code> = fusion verticale. Ne jamais utiliser les tableaux pour la mise en page !</div>' +
'<div class="wrn"><strong>⚠️ Tableaux UNIQUEMENT pour données tabulaires :</strong> Horaires, tarifs, stocks... Pas pour des layouts. C\'est le rôle de CSS Flexbox et Grid.</div>';

// ============================================================
// HELPERS
// ============================================================
function code(fname, lines) {
  var rows = lines.map(function(l, i) {
    return '<div class="ln-row"><span class="ln">' + (i+1) + '</span><span class="lc">' + l + '</span></div>';
  }).join('');
  return '<div class="cw"><div class="cfl">📄 <span>' + fname + '</span></div><div class="cb">' + rows + '</div><button class="cp" onclick="cpCode(this)">Copier</button></div>';
}

// ============================================================
// BUILD
// ============================================================
var S = {cur:0, tab:{}, answered:{}, done:{}, scores:{}};

function buildSidebar() {
  var nav = document.getElementById('nav');
  nav.innerHTML = MODS.map(function(m) {
    return '<button class="ni ' + (m.id===0?'act':'') + '" onclick="goMod(' + m.id + ')" id="ni-' + m.id + '">' +
      '<div class="ni-ic">' + m.icon + '</div>' +
      '<div class="ni-tx">' + m.title + '</div>' +
      '<div class="ni-ck">✓</div>' +
    '</button>';
  }).join('');
}

function buildMain() {
  var main = document.getElementById('main');
  main.innerHTML = MODS.map(function(m) { return buildMod(m); }).join('');
  setTimeout(function() { refreshPv(0); }, 100);
}

function buildMod(m) {
  return '<div class="mod ' + (m.id===0?'act':'') + '" id="mod-' + m.id + '">' +
    '<div class="hero">' +
      '<div class="hero-top"><span class="m-badge">' + m.badge + '</span><span class="m-dur">⏱ ' + m.dur + '</span></div>' +
      '<div class="m-ttl">' + m.icon + ' ' + m.title + '</div>' +
      '<div class="tabs">' +
        '<button class="tb act" onclick="goTab(' + m.id + ',\'cours\')" id="tb-' + m.id + '-cours">📖 Cours</button>' +
        '<button class="tb" onclick="goTab(' + m.id + ',\'atelier\')" id="tb-' + m.id + '-atelier">⚗️ Atelier Live</button>' +
        '<button class="tb" onclick="goTab(' + m.id + ',\'exercices\')" id="tb-' + m.id + '-exercices">💪 Exercices</button>' +
        '<button class="tb" onclick="goTab(' + m.id + ',\'quiz\')" id="tb-' + m.id + '-quiz">🧠 Quiz</button>' +
      '</div>' +
    '</div>' +
    '<div class="tab-content act" id="tc-' + m.id + '-cours"><div class="lesson">' + COURS[m.id] + '</div></div>' +
    '<div class="tab-content" id="tc-' + m.id + '-atelier">' + buildAtelier(m) + '</div>' +
    '<div class="tab-content" id="tc-' + m.id + '-exercices">' + buildExs(m) + '</div>' +
    '<div class="tab-content" id="tc-' + m.id + '-quiz">' + buildQuiz(m) + '</div>' +
  '</div>';
}

function buildAtelier(m) {
  var def = DEFAULTS[m.id].replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return '<div class="atl">' +
    '<div class="ed-s">' +
      '<div class="ed-tb">' +
        '<span>📝 index.html</span>' +
        '<button class="rst-b" onclick="resetEd(' + m.id + ')">↺ Reset</button>' +
        '<button class="run-b" onclick="refreshPv(' + m.id + ')">▶ Exécuter</button>' +
      '</div>' +
      '<textarea class="ced" id="ed-' + m.id + '" spellcheck="false" oninput="refreshPv(' + m.id + ')">' + def + '</textarea>' +
    '</div>' +
    '<div class="pv-s">' +
      '<div class="pv-tb"><div class="dots"><div class="dot dr"></div><div class="dot dy"></div><div class="dot dg"></div></div><span>Aperçu en direct</span></div>' +
      '<iframe class="pvf" id="pv-' + m.id + '"></iframe>' +
    '</div>' +
  '</div>';
}

function buildExs(m) {
  var html = '<div class="exp">';
  m.exs.forEach(function(ex) {
    var diffClass = ex.diff === 'easy' ? 'easy' : (ex.diff === 'med' ? 'med' : 'hard');
    var diffLabel = ex.diff === 'easy' ? '⭐ Facile' : (ex.diff === 'med' ? '⭐⭐ Moyen' : '⭐⭐⭐ Difficile');
    var steps = ex.steps.map(function(s) { return '<li>' + s + '</li>'; }).join('');
    html += '<div class="exb">' +
      '<div class="exh">' +
        '<div class="ex-n">' + ex.n + '</div>' +
        '<div class="ex-t">' + ex.title + '</div>' +
        '<span class="ex-d ' + diffClass + '">' + diffLabel + '</span>' +
      '</div>' +
      '<div class="exbd">' +
        '<p>' + ex.desc + '</p>' +
        '<ul>' + steps + '</ul>' +
        '<button class="lex" onclick="loadEx(' + m.id + ',\'' + ex.sk + '\')">▶ Ouvrir dans l\'éditeur</button>' +
      '</div>' +
    '</div>';
  });
  html += '</div>';
  return html;
}

function buildQuiz(m) {
  var lets = ['A','B','C','D'];
  var qs = m.quiz.map(function(q, qi) {
    var opts = q.opts.map(function(o, oi) {
      return '<div class="opt" id="opt-' + m.id + '-' + qi + '-' + oi + '" onclick="answer(' + m.id + ',' + qi + ',' + oi + ',' + q.c + ')">' +
        '<div class="opt-l">' + lets[oi] + '</div><div>' + o + '</div>' +
      '</div>';
    }).join('');
    var qcode = q.code ? '<div class="q-code">' + q.code + '</div>' : '';
    return '<div class="qq" id="qq-' + m.id + '-' + qi + '">' +
      '<div class="q-n">Question ' + (qi+1) + ' / ' + m.quiz.length + '</div>' +
      '<div class="q-t">' + q.q + '</div>' +
      qcode +
      '<div class="opts">' + opts + '</div>' +
      '<div class="q-exp" id="exp-' + m.id + '-' + qi + '">💡 ' + q.exp + '</div>' +
    '</div>';
  }).join('');

  var nextBtn = m.id < 5
    ? '<button class="nbtn" onclick="goMod(' + (m.id+1) + ')">Module suivant →</button>'
    : '<p style="font-size:22px;margin-top:.5rem">🚀🌐💻</p>';

  return '<div class="qp">' +
    '<div class="qhd"><h2>🧠 Quiz — ' + m.title + '</h2><p>Réponds aux ' + m.quiz.length + ' questions pour valider le module. Tu peux recommencer autant de fois que nécessaire.</p></div>' +
    '<div class="qprev"><div class="qprev-ic">🎯</div><div class="qprev-inf"><strong id="sd-' + m.id + '">0 / ' + m.quiz.length + '</strong>Réponses correctes</div></div>' +
    qs +
    '<div class="qres" id="qr-' + m.id + '">' +
      '<div class="re-em" id="re-' + m.id + '">🎉</div>' +
      '<div class="re-st" id="rs-' + m.id + '"></div>' +
      '<div class="re-ttl" id="rt-' + m.id + '">Résultat</div>' +
      '<div class="re-sc" id="rsc-' + m.id + '">0/' + m.quiz.length + '</div>' +
      '<div class="re-msg" id="rm-' + m.id + '"></div>' +
      '<button class="rbtn" onclick="retryQ(' + m.id + ')">🔄 Recommencer</button>' +
    '</div>' +
    '<button class="vbtn" id="vb-' + m.id + '" onclick="validateQ(' + m.id + ')" style="display:none">✅ Voir mes résultats</button>' +
  '</div>' +
  '<div class="done-bn" id="db-' + m.id + '">' +
    '<h3>🏆 Module ' + (m.id+1) + ' validé !</h3>' +
    '<p>' + (m.id < 5 ? 'Excellent ! Tu peux passer au module suivant.' : '🎓 Tu as complété tout le cours HTML !') + '</p>' +
    nextBtn +
  '</div>';
}

// ============================================================
// LOGIC
// ============================================================
function goMod(id) {
  document.querySelectorAll('.mod').forEach(function(el) { el.classList.remove('act'); });
  document.querySelectorAll('.ni').forEach(function(el) { el.classList.remove('act'); });
  document.getElementById('mod-' + id).classList.add('act');
  document.getElementById('ni-' + id).classList.add('act');
  S.cur = id;
  goTab(id, S.tab[id] || 'cours', true);
  setTimeout(function() { refreshPv(id); }, 60);
}

function goTab(mid, tab, force) {
  if (!force && S.tab[mid] === tab) return;
  S.tab[mid] = tab;
  ['cours','atelier','exercices','quiz'].forEach(function(t) {
    var btn = document.getElementById('tb-' + mid + '-' + t);
    var tc = document.getElementById('tc-' + mid + '-' + t);
    if (btn) btn.classList.toggle('act', t === tab);
    if (tc) tc.classList.toggle('act', t === tab);
  });
  if (tab === 'atelier') setTimeout(function() { refreshPv(mid); }, 60);
}

function refreshPv(mid) {
  var ed = document.getElementById('ed-' + mid);
  var pv = document.getElementById('pv-' + mid);
  if (!ed || !pv) return;
  var raw = ed.value.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
  var d = pv.contentDocument || pv.contentWindow.document;
  d.open(); d.write(raw); d.close();
}

function resetEd(mid) {
  var ed = document.getElementById('ed-' + mid);
  if (ed) {
    ed.value = DEFAULTS[mid];
    refreshPv(mid);
  }
}

function loadEx(mid, key) {
  var starter = STARTERS[key] || '';
  var ed = document.getElementById('ed-' + mid);
  if (ed) { ed.value = starter; refreshPv(mid); }
  goTab(mid, 'atelier', true);
}

function cpCode(btn) {
  var lines = btn.parentElement.querySelectorAll('.lc');
  var text = Array.from(lines).map(function(l) { return l.innerText; }).join('\n');
  navigator.clipboard.writeText(text).then(function() {
    btn.textContent = '✓ Copié !';
    setTimeout(function() { btn.textContent = 'Copier'; }, 2000);
  });
}

function answer(mid, qi, oi, correct) {
  var opts = document.querySelectorAll('[id^="opt-' + mid + '-' + qi + '-"]');
  opts.forEach(function(o) { o.classList.add('lck'); o.onclick = null; });
  var sel = document.getElementById('opt-' + mid + '-' + qi + '-' + oi);
  if (oi === correct) {
    sel.classList.add('ok');
  } else {
    sel.classList.add('ko');
    document.getElementById('opt-' + mid + '-' + qi + '-' + correct).classList.add('rev');
  }
  document.getElementById('exp-' + mid + '-' + qi).classList.add('sh');
  if (!S.answered[mid]) S.answered[mid] = new Array(MODS[mid].quiz.length).fill(null);
  S.answered[mid][qi] = (oi === correct);
  var score = S.answered[mid].filter(function(a) { return a === true; }).length;
  document.getElementById('sd-' + mid).textContent = score + ' / ' + MODS[mid].quiz.length;
  var answered = S.answered[mid].filter(function(a) { return a !== null; }).length;
  if (answered === MODS[mid].quiz.length) {
    document.getElementById('vb-' + mid).style.display = 'block';
  }
}

function validateQ(mid) {
  var a = S.answered[mid] || [];
  var total = MODS[mid].quiz.length;
  var score = a.filter(function(x) { return x === true; }).length;
  var pct = score / total;
  var emoji, stars, title, msg;
  if (pct === 1)    { emoji='🏆'; stars='⭐⭐⭐⭐⭐'; title='Parfait !';  msg='5/5 ! Tu maîtrises ce module à 100% !'; }
  else if (pct>=.8) { emoji='🎉'; stars='⭐⭐⭐⭐';   title='Excellent !'; msg='Très bon score ! Quelques points à revoir.'; }
  else if (pct>=.6) { emoji='👍'; stars='⭐⭐⭐';     title='Bien !';      msg='Bon travail ! Relis les explications des questions manquées.'; }
  else              { emoji='💪'; stars='⭐⭐';       title='Continue !';  msg='Relis attentivement le cours, tu vas y arriver !'; }
  document.getElementById('re-' + mid).textContent = emoji;
  document.getElementById('rs-' + mid).textContent = stars;
  document.getElementById('rt-' + mid).textContent = title;
  document.getElementById('rsc-' + mid).textContent = score + ' / ' + total;
  document.getElementById('rm-' + mid).textContent = msg;
  document.getElementById('qr-' + mid).classList.add('sh');
  if (pct >= 0.6) {
    S.done[mid] = true;
    document.getElementById('db-' + mid).classList.add('sh');
    document.getElementById('ni-' + mid).classList.add('done');
    updateProg();
  }
}

function retryQ(mid) {
  var total = MODS[mid].quiz.length;
  S.answered[mid] = new Array(total).fill(null);
  for (var qi = 0; qi < total; qi++) {
    (function(q) {
      var opts = document.querySelectorAll('[id^="opt-' + mid + '-' + q + '-"]');
      opts.forEach(function(o, oi) {
        o.classList.remove('ok','ko','lck','rev');
        (function(i) {
          o.onclick = function() { answer(mid, q, i, MODS[mid].quiz[q].c); };
        })(oi);
      });
      document.getElementById('exp-' + mid + '-' + q).classList.remove('sh');
    })(qi);
  }
  document.getElementById('sd-' + mid).textContent = '0 / ' + total;
  document.getElementById('qr-' + mid).classList.remove('sh');
  document.getElementById('vb-' + mid).style.display = 'none';
}

function updateProg() {
  var done = Object.values(S.done).filter(Boolean).length;
  document.getElementById('gpf').style.width = (done / MODS.length * 100) + '%';
  document.getElementById('gpt').textContent = done + '/' + MODS.length;
}

// INIT
buildSidebar();
buildMain();
</script>
</body>
</html>
